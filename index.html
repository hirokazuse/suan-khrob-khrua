<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สวนครอบครัว — Suan Khrob Khrua</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    body { background: linear-gradient(145deg, #faf8f2 0%, #f0f7f0 40%, #e8f5e8 100%); }
    .decorative-line {
      width: 60px; height: 1.5px;
      background: linear-gradient(90deg, var(--gold), transparent);
      margin: 1.5rem auto;
    }
    .landing-leaf {
      position: fixed;
      opacity: 0.06;
      pointer-events: none;
      font-size: 15rem;
      user-select: none;
    }
    .leaf-1 { top: -5%; right: -5%; transform: rotate(20deg); }
    .leaf-2 { bottom: -8%; left: -5%; transform: rotate(-15deg); font-size: 12rem; }
  </style>
</head>
<body>
  <div class="landing-leaf leaf-1">🌿</div>
  <div class="landing-leaf leaf-2">🌿</div>

  <div class="landing">
    <div class="landing-inner">
      <div class="landing-sub">Thai–Japan Family Farm Project</div>
      <div class="landing-logo">สวนครอบครัว</div>
      <div class="decorative-line"></div>
      <p class="landing-tagline">
        From family farms in Nong Khai and Chiba,<br>
        bringing authentic Thai flavors to your table.
      </p>

      <div class="lang-choice">
        <a href="ja/index.html" class="lang-choice-btn">
          <span class="lang-flag">🇯🇵</span>
          <span class="lang-text">
            <span class="lang-name">日本語版</span>
            <span class="lang-desc">Japanese — タイと日本の家族農園から</span>
          </span>
        </a>
        <a href="th/index.html" class="lang-choice-btn">
          <span class="lang-flag">🇹🇭</span>
          <span class="lang-text">
            <span class="lang-name">ภาษาไทย</span>
            <span class="lang-desc">Thai — จากไร่ครอบครัวไทยและญี่ปุ่น</span>
          </span>
        </a>
        <a href="en/index.html" class="lang-choice-btn">
          <span class="lang-flag">🌏</span>
          <span class="lang-text">
            <span class="lang-name">English</span>
            <span class="lang-desc">From our farms to your table</span>
          </span>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
